<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>GYM TRACKER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══════════════════════════════════════
       ENCABEZADO
  ══════════════════════════════════════ -->
  <header class="app-header">
    <div class="header-inner">
      <div class="header-brand">
        <span class="brand-icon">⚡</span>
        <h1 class="brand-title">GYM<span class="accent">TRACKER</span></h1>
      </div>
      <div class="header-date" id="headerDate"></div>
    </div>
  </header>

  <!-- ══════════════════════════════════════
       BARRA DE PROGRESO
  ══════════════════════════════════════ -->
  <section class="progress-section">
    <div class="progress-inner">
      <div class="progress-labels">
        <span class="progress-label">PROGRESO DEL DÍA</span>
        <span class="progress-percent" id="progressPercent">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-sublabel" id="progressSubLabel">Selecciona un día para comenzar</div>
    </div>
  </section>

  <!-- ══════════════════════════════════════
       NAVEGACIÓN DE DÍAS
  ══════════════════════════════════════ -->
  <nav class="days-nav">
    <div class="days-scroll">
      <button class="day-btn" data-day="lunes">
        <span class="day-short">LUN</span>
        <span class="day-focus">PECHO</span>
      </button>
      <button class="day-btn" data-day="martes">
        <span class="day-short">MAR</span>
        <span class="day-focus">ESPALDA</span>
      </button>
      <button class="day-btn" data-day="miercoles">
        <span class="day-short">MIÉ</span>
        <span class="day-focus">PIERNAS</span>
      </button>
      <button class="day-btn" data-day="viernes">
        <span class="day-short">VIE</span>
        <span class="day-focus">UPPER</span>
      </button>
      <button class="day-btn" data-day="sabado">
        <span class="day-short">SÁB</span>
        <span class="day-focus">PIERNAS</span>
      </button>
    </div>
  </nav>

  <!-- ══════════════════════════════════════
       CONTENIDO PRINCIPAL
  ══════════════════════════════════════ -->
  <main class="main-content">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🏋️</div>
      <p class="empty-title">ELIGE TU DÍA</p>
      <p class="empty-sub">Selecciona un día arriba para ver tu rutina</p>
    </div>
    <div class="exercises-container" id="exercisesContainer"></div>
  </main>

  <!-- ══════════════════════════════════════
       BARRA DE ACCIONES
  ══════════════════════════════════════ -->
  <footer class="actions-bar" id="actionsBar" style="display:none;">
    <button class="action-btn btn-reset" id="btnResetDay">↺ RESETEAR DÍA</button>
    <button class="action-btn btn-clear" id="btnClearAll">✕ BORRAR TODO</button>
  </footer>

  <!-- ══════════════════════════════════════
       PANEL DE HISTORIAL (slide-in)
  ══════════════════════════════════════ -->
  <div class="historial-overlay" id="historialOverlay"></div>
  <aside class="historial-panel" id="historialPanel">
    <div class="historial-header">
      <div class="historial-header-top">
        <span class="historial-label">HISTORIAL</span>
        <button class="historial-close" id="historialClose">✕</button>
      </div>
      <h2 class="historial-title" id="historialTitle"></h2>
    </div>
    <div class="historial-content" id="historialContent"></div>
  </aside>

  <script src="script.js"></script>
</body>
</html>
